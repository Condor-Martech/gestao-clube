on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

# The concurrency group includes `event_name` so that `issue_comment` runs
# (e.g. the Vercel bot posting a preview comment seconds after a PR opens)
# do NOT cancel an in-progress `pull_request` review run. Without this, a bot
# comment racing the docker build cancels the review before it ever starts.
concurrency:
  group: pr-agent-${{ github.event.pull_request.number || github.event.issue.number }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run pr agent on every pull request, respond to user comments
    steps:
      - name: PR Agent action step
        id: pragent
        uses: The-PR-Agent/pr-agent@v0.35.0
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
